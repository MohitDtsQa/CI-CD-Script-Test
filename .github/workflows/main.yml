name: CI CD Script Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  fork:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 5"  

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 0.01

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run JavaScript
        run: |
          node -e "console.log('This is CI CD Script test');"
      
      - name: Check Node.Js Version
        run: |
          node -v
      
