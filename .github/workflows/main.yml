name: CI CD Script Test

on:
  push:
    branches: [main, master]
  # pull_request:
  #   branches: [main, master]
  # fork:
  # workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run JavaScript
        run: |
          node -e "console.log('This is CI CD Script test');"
      
      - name: Check Node.Js Version
        run: |
          node -v
      
      - name: Check Python Version
        run: |
          python -v
        
      - name: Check Java Version
        run: |
          java -v
      
